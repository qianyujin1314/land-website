<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>登录</title>
<style>
body {
  background:#f4f7fb;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  background:white;
  padding:20px;
  border-radius:12px;
  width:300px;
}
input {
  width:100%;
  margin:10px 0;
  padding:8px;
}
button {
  width:100%;
  padding:10px;
  background:#00c3ff;
  border:none;
  color:white;
  border-radius:8px;
}
</style>
</head>
<body>
<div class="box">
  <h2>登录</h2>
  <input id="email" placeholder="Email"/>
  <input id="password" type="password" placeholder="Password"/>
  <button onclick="login()">登录</button>
</div>
<script>
function login(){
  fetch('http://localhost:3000/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  })
  .then(res=>res.json())
  .then(user=>{
    localStorage.setItem("user", JSON.stringify(user));
    alert("登录成功");
  });
}
</script>
</body>
</html>
