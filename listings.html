<!DOCTYPE html>
<html>
<head>
  <title>LandInvest - Listings</title>
  <link rel="stylesheet" href="style.css">
  <script src="data.js"></script>
</head>
<body>

<header>
  <h2>LandInvest</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="listings.html">Listings</a>
    <a href="ai.html">AI Finder</a>
    <a href="auth.html">Login</a>
    <a href="subscription.html">Subscribe</a>
  </div>
</header>

<h1 style="padding: 40px 40px 0;">Land Listings</h1>
<div id="list" style="display:flex; flex-wrap:wrap;"></div>

<script>
  let html = "";
  data.forEach((item, i) => {
    html += `<div class="card">
      <h3>${item.title}</h3>
      <p>${item.country}</p>
      <p>$${item.price.toLocaleString()}</p>
      <button onclick="view(${i})">View Details</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;

  function view(i) {
    localStorage.setItem("id", i);
    window.location = "detail.html";
  }
</script>

</body>
</html>
