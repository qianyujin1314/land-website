<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>AI选地分析</title>
<style>
body {
  font-family:Arial;
  background:#f4f7fb;
  padding:20px;
}
.box {
  background:white;
  padding:20px;
  border-radius:12px;
}
</style>
</head>
<body>
<div class="box">
  <h2>AI土地分析</h2>
  <button onclick="analyze()">分析当前地块</button>
  <div id="result"></div>
</div>
<script>
function analyze(){
  const user = JSON.parse(localStorage.getItem("user"));
  if(!user || !user.isSubscribed){
    alert("请先订阅");
    return;
  }
  document.getElementById("result").innerHTML = `
    <h3>评分: 85/100</h3>
    <p>适合：别墅开发</p>
    <p>优点：靠近湖泊</p>
    <p>缺点：商业配套不足</p>
  `;
}
</script>
</body>
</html>
