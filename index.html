<!DOCTYPE html>
<html>
<head>
<title>LandInvest</title>
<link rel="stylesheet" href="style.css">
<script src="data.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
</head>
<body>

<header>
  <h2>LandInvest</h2>
  <div>
    <a href="listings.html">Listings</a>
    <a href="ai.html">AI Finder</a>
    <a href="auth.html">Login</a>
    <a href="subscription.html">Subscribe</a>
  </div>
  <div class="lang-switch">
    <select onchange="switchLang(this.value)">
      <option value="en">EN</option>
      <option value="zh">中文</option>
    </select>
  </div>
</header>

<section class="hero">
  <h1>Global Land Investment Intelligence</h1>
  <p>Data + AI powered land investment platform</p>
</section>

<div id="map" style="height:500px;"></div>

<script>
  mapboxgl.accessToken = 'YOUR_MAPBOX_TOKEN';
  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [0, 20],
    zoom: 1.5
  });

  data.forEach((item, i) => {
    new mapboxgl.Marker()
      .setLngLat([item.lng, item.lat])
      .setPopup(new mapboxgl.Popup().setHTML(`<h3>${item.title}</h3><button onclick="go(${i})">View</button>`))
      .addTo(map);
  });

  function go(i) {
    localStorage.setItem("id", i);
    window.location = "detail.html";
  }

  function switchLang(l) {
    alert("Switch language to: " + l);
  }
</script>

</body>
</html>
